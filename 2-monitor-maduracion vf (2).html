<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Maduración</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f0ede8;font-family:'IBM Plex Sans',sans-serif;color:#1c1c1c;min-height:100vh}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc}

  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scanFlash{0%{outline-color:rgba(192,125,42,.9);outline-offset:0}60%{outline-color:rgba(192,125,42,0);outline-offset:6px}100%{outline-color:rgba(192,125,42,0);outline-offset:0}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulseBorder{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 4px rgba(220,38,38,.1)}}

  /* ── TOPBAR ── */
  .topbar{background:#1c1c1c;padding:0 28px;height:88px;display:grid;
    grid-template-columns:auto 1fr auto auto;align-items:center;gap:24px;
    position:sticky;top:0;z-index:100;
    border-bottom:2px solid #c07d2a}
  .brand{display:flex;align-items:center;gap:16px}
  .brand-mark{width:48px;height:48px;border:2px solid #c07d2a;display:flex;align-items:center;
    justify-content:center;font-family:'Bebas Neue';font-size:20px;color:#c07d2a}
  .brand-title{font-family:'Bebas Neue';font-size:36px;letter-spacing:6px;color:#fff}
  .brand-sub{font-size:11px;color:#c07d2a;font-family:'IBM Plex Mono';letter-spacing:3px;margin-top:3px;font-weight:600}

  .scanner-wrap{display:flex;align-items:center;gap:10px;background:#2a2a2a;border:1px solid #3a3a3a;
    padding:8px 16px;max-width:380px;transition:border .2s}
  .scanner-wrap:focus-within{border-color:#c07d2a}
  #scanner-input{background:none;border:none;color:#fff;font-family:'IBM Plex Mono';font-size:13px;outline:none;width:100%}
  #scanner-input::placeholder{color:#888}

  .stats-row{display:flex;gap:20px}
  .stat{text-align:right}
  .stat-num{font-family:'Bebas Neue';font-size:36px;line-height:1}
  .stat-lbl{font-size:9px;color:#aaa;font-family:'IBM Plex Mono';letter-spacing:2px}

  .clock-area{font-family:'IBM Plex Mono';font-size:10px;color:#aaa;border-left:1px solid #2a2a2a;padding-left:20px;line-height:1.9}
  .sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:middle;margin-right:5px;transition:background .3s}

  /* ── CONTENT ── */
  .content{padding:20px 28px}

  /* ── BARRA DE CONTROLES ── */
  .controls-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}

  /* PESTAÑAS PRINCIPALES — con/sin hueso */
  .tab-group{display:flex;border:2px solid #1c1c1c;overflow:hidden}
  .tab-main{background:#fff;border:none;padding:10px 20px;font-family:'Bebas Neue';
    font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s;color:#1c1c1c;border-right:2px solid #1c1c1c}
  .tab-main:last-child{border-right:none}
  .tab-main.active.hueso{background:#78350f;color:#fff}
  .tab-main.active.sin-hueso{background:#1e40af;color:#fff}
  .tab-main:hover:not(.active){background:#f5f5f5;color:#1c1c1c}
  .tab-count{font-family:'IBM Plex Mono';font-size:11px;margin-left:6px;opacity:.8}

  /* FILTRO ESTADO */
  .status-filters{display:flex;gap:4px;flex-wrap:wrap}
  .sfilter{background:#fff;border:1.5px solid #ddd;padding:6px 12px;font-family:'IBM Plex Mono';
    font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;color:#333}
  .sfilter:hover{border-color:#1c1c1c;color:#1c1c1c}
  .sfilter.active{color:#fff;border-color:transparent}
  .sfilter.active.all{background:#1c1c1c}
  .sfilter.active.ok{background:#16a34a}
  .sfilter.active.warn{background:#d97706}
  .sfilter.active.critical{background:#dc2626}
  .sfilter.active.expired{background:#6b7280}

  /* ORDENAMIENTO */
  .sort-group{display:flex;align-items:center;gap:6px;margin-left:auto}
  .sort-label{font-family:'IBM Plex Mono';font-size:9px;color:#1c1c1c;letter-spacing:2px;text-transform:uppercase}
  .sort-btn{background:#fff;border:1.5px solid #ddd;padding:6px 12px;font-family:'IBM Plex Mono';
    font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .2s;color:#333;text-transform:uppercase}
  .sort-btn.active{background:#1c1c1c;color:#fff;border-color:#1c1c1c}
  .sort-btn:hover:not(.active){border-color:#1c1c1c;color:#1c1c1c}

  .refresh-btn{background:#fff;border:1.5px solid #ddd;color:#333;padding:7px 14px;
    font-family:'IBM Plex Mono';font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .refresh-btn:hover{border-color:#c07d2a;color:#c07d2a}

  /* LEYENDA */
  .legend{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .legend-item{display:flex;align-items:center;gap:6px;background:#fff;padding:5px 12px}

  /* ── PANEL DE RESUMEN KG ── */
  @keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
  #kg-toggle-btn:hover{ background:rgba(192,125,42,.06) !important }
  .kg-chip{
    display:flex;flex-direction:column;background:#1a1a1a;
    border:1px solid #2a2a2a;padding:10px 14px;cursor:pointer;
    transition:all .18s;user-select:none;-webkit-user-select:none;
    min-width:100px;position:relative;overflow:hidden
  }
  .kg-chip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#333}
  .kg-chip:hover{border-color:#c07d2a;background:#1f1a10}
  .kg-chip:hover::before{background:#c07d2a}
  .kg-chip.alert-high{border-color:#dc262655;background:#1a0000;animation:pulse-red 1.2s infinite}
  .kg-chip.alert-high::before{background:#dc2626}
  .kg-chip.alert-low{border-color:#f59e0b55;background:#140f00}
  .kg-chip.alert-low::before{background:#f59e0b}
  .kg-chip.alert-ok::before{background:#16a34a}
  .kg-chip-name{font-family:'IBM Plex Mono';font-size:9px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .kg-chip-val{font-family:'Bebas Neue';font-size:26px;color:#fff;line-height:1}
  .kg-chip-unit{font-family:'IBM Plex Mono';font-size:8px;color:#444;margin-top:3px;letter-spacing:1px}
  .kg-chip.alert-high .kg-chip-val{color:#f87171}
  .kg-chip.alert-low  .kg-chip-val{color:#fbbf24}
  .kg-chip.alert-ok   .kg-chip-val{color:#4ade80}

  /* Modal desglose kg */
  .kg-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
    z-index:2000;align-items:center;justify-content:center}
  .kg-modal-overlay.open{display:flex}
  .kg-modal{background:#111;border:2px solid #c07d2a;width:100%;max-width:480px;
    max-height:80vh;overflow-y:auto;padding:0}
  .kg-modal-header{background:#1c1c1c;padding:16px 20px;display:flex;
    justify-content:space-between;align-items:center;border-bottom:1px solid #333;
    position:sticky;top:0}
  .kg-modal-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:#c07d2a}
  .kg-modal-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer;
    padding:4px 8px}
  .kg-modal-body{padding:16px 20px}
  .kg-modal-total{font-family:'Bebas Neue';font-size:36px;color:#fff;
    display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
  .kg-modal-total span{font-size:14px;color:#1c1c1c;font-family:'IBM Plex Mono'}
  .kg-alert-badge{padding:4px 12px;font-family:'IBM Plex Mono';font-size:10px;
    letter-spacing:2px;font-weight:700;margin-bottom:16px;display:inline-block}
  .kg-alert-badge.high{background:#450a0a;color:#f87171;border:1px solid #dc2626}
  .kg-alert-badge.low{background:#1a1200;color:#fbbf24;border:1px solid #f59e0b}
  .kg-alert-badge.ok{background:#052e16;color:#4ade80;border:1px solid #16a34a}
  .kg-row{display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid #1a1a1a}
  .kg-row:last-child{border-bottom:none}
  .kg-row-left{display:flex;flex-direction:column;gap:2px}
  .kg-row-id{font-family:'IBM Plex Mono';font-size:9px;color:#444;letter-spacing:1px}
  .kg-row-dates{font-family:'IBM Plex Mono';font-size:10px;color:#555}
  .kg-row-status{font-size:10px;font-family:'IBM Plex Mono';letter-spacing:1px}
  .kg-row-weight{font-family:'Bebas Neue';font-size:22px;color:#fff}
  .kg-row-weight span{font-size:11px;color:#555;font-family:'IBM Plex Mono'}
  .s-ok2{color:#4ade80}.s-warn2{color:#fbbf24}.s-crit2{color:#f87171}.s-exp2{color:#555}
  .legend-dot{width:10px;height:10px;border-radius:2px}
  .legend-lbl{font-size:9px;font-family:'IBM Plex Mono';font-weight:700;letter-spacing:1px}

  /* SEPARADOR DE CATEGORÍA */
  .category-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;margin-top:4px}
  .category-badge{padding:8px 18px;font-family:'Bebas Neue';font-size:16px;letter-spacing:3px;display:flex;align-items:center;gap:8px}
  .category-badge.hueso{background:#78350f;color:#fff}
  .category-badge.sin-hueso{background:#1e40af;color:#fff}
  .category-line{flex:1;height:2px}
  .category-count{font-family:'IBM Plex Mono';font-size:10px;color:#333;letter-spacing:1px}

  /* GRID */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px}

  /* CARD */
  .cut-card{display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,box-shadow .15s;animation:cardIn .3s ease}
  .cut-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
  .cut-card.highlighted{animation:cardIn .3s ease,scanFlash 1.5s ease;outline:3px solid #c07d2a}
  .cut-card.status-critical{animation:cardIn .3s ease,pulseBorder 2s infinite}

  .card-header{padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
  .card-header-left{display:flex;align-items:center;gap:8px}
  .card-status-text{font-family:'IBM Plex Mono';font-size:11px;font-weight:700;letter-spacing:2px}
  .card-id-top{font-family:'IBM Plex Mono';font-size:8px;opacity:.75}
  .card-progress-bar{height:5px}
  .card-progress-fill{height:100%;transition:width 1s ease}

  .card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:10px}
  .card-cut-name{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;line-height:1;color:#1c1c1c}
  .card-provider{font-size:11px;color:#444;font-family:'IBM Plex Mono';margin-top:2px}

  .card-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .date-box{padding:8px 10px}
  .date-box-lbl{font-size:8px;letter-spacing:2px;color:#333;font-family:'IBM Plex Mono';text-transform:uppercase}
  .date-box-val{font-family:'IBM Plex Mono';font-size:11px;font-weight:700;margin-top:3px}

  .prog-info{display:flex;justify-content:space-between;align-items:center}
  .prog-pct{font-size:10px;color:#333;font-family:'IBM Plex Mono'}
  .prog-days{font-family:'Bebas Neue';font-size:17px}
  .prog-track{height:5px;margin-top:4px}
  .prog-fill{height:100%;transition:width 1s}

  .card-footer{display:flex;justify-content:space-between;align-items:flex-end;padding-top:10px;margin-top:auto}
  .card-meta{font-size:9px;color:#333;font-family:'IBM Plex Mono';line-height:1.8}
  .card-hint{font-size:8px;color:#555;font-family:'IBM Plex Mono'}

  /* EMPTY */
  .empty-state{border:2px dashed #ddd;padding:60px 40px;text-align:center;color:#bbb;background:#fff;grid-column:1/-1}
  .empty-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:4px;margin-bottom:6px}
  .empty-sub{font-family:'IBM Plex Mono';font-size:11px}

  /* LOADING */
  .loading-state{text-align:center;padding:80px;color:#bbb;font-family:'IBM Plex Mono';font-size:12px;grid-column:1/-1}
  .spinner{width:32px;height:32px;border:2px solid #ddd;border-top-color:#c07d2a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;width:460px;max-height:90vh;overflow-y:auto;position:relative;animation:cardIn .2s ease}
  .modal-header{padding:18px 24px;display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:#fff}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#fff;opacity:.8}
  .modal-body{padding:24px}
  .modal-prog-bar{height:8px}
  .modal-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
  .modal-stat{padding:12px;text-align:center}
  .modal-stat-num{font-family:'Bebas Neue';font-size:30px;line-height:1}
  .modal-stat-lbl{font-family:'IBM Plex Mono';font-size:8px;color:#555;letter-spacing:1px;margin-top:4px}

  .toast{position:fixed;bottom:24px;right:24px;color:#fff;padding:13px 24px;
    font-family:'IBM Plex Mono';font-size:13px;font-weight:700;z-index:9999;
    box-shadow:0 4px 24px rgba(0,0,0,.3);animation:slideUp .2s ease;display:none}

  @media(max-width:900px){
    .topbar{grid-template-columns:auto 1fr;height:auto;padding:12px 16px;gap:12px}
    .stats-row,.clock-area{display:none}
    .scanner-wrap{max-width:100%}
    .content{padding:16px}
    .cards-grid{grid-template-columns:1fr}
    .controls-bar{gap:8px}
    .sort-group{margin-left:0}
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <img src="https://static.wixstatic.com/media/6e9540_c3f4a829345b45f5816b96eecfa71872~mv2.png/v1/fill/w_78,h_80,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/Logo%20Furca%20350x350px.png"
      alt="Furca" style="width:46px;height:46px;object-fit:contain;filter:brightness(0) invert(1)">
    <div>
      <div class="brand-title">MADURACIÓN</div>
      <div class="brand-sub">FURCA · MONITOR EN TIEMPO REAL</div>
    </div>
  </div>

  <div class="scanner-wrap">
    <span style="font-size:16px;opacity:.4;color:#fff">⬡</span>
    <input id="scanner-input" placeholder="Escanea QR o escribe ID del corte…" autocomplete="off">
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="stat-ok"   style="color:#4ade80">0</div><div class="stat-lbl">EN PROCESO</div></div>
    <div class="stat"><div class="stat-num" id="stat-warn" style="color:#fbbf24">0</div><div class="stat-lbl">POR VENCER</div></div>
    <div class="stat"><div class="stat-num" id="stat-exp"  style="color:#f87171">0</div><div class="stat-lbl">VENCIDOS</div></div>
  </div>

  <div class="clock-area">
    <div id="clock-text">—</div>
    <div><span class="sync-dot" id="sync-dot" style="background:#555"></span><span id="sync-text" style="font-size:9px">Conectando…</span></div>
  </div>
</div>

<!-- PANEL KG: BOTÓN ACCORDION -->
<div style="background:#111;border-bottom:1px solid #2a2a2a">

  <!-- BOTÓN PRINCIPAL -->
  <button type="button" id="kg-toggle-btn" onclick="toggleKgPanel()"
    style="width:100%;background:transparent;border:none;cursor:pointer;
      padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
      color:#fff;user-select:none;-webkit-user-select:none">
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-family:'Bebas Neue';font-size:14px;letter-spacing:4px;color:#c07d2a">
        INVENTARIO · KG POR CORTE
      </span>
      <div id="kg-alert-badges" style="display:flex;gap:6px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div id="kg-summary-inline" style="font-family:'IBM Plex Mono';font-size:10px;color:#ccc;letter-spacing:1px"></div>
      <span id="kg-chevron" style="font-size:16px;color:#c07d2a;transition:transform .25s">▼</span>
    </div>
  </button>

  <!-- PANEL EXPANDIBLE -->
  <div id="kg-panel" style="display:none;border-top:1px solid #1a1a1a;overflow:hidden">
    <div style="padding:16px 24px;display:flex;flex-wrap:wrap;gap:10px" id="kg-chips-wrap">
      <span style="font-family:'IBM Plex Mono';font-size:10px;color:#444">Cargando...</span>
    </div>
  </div>

</div>

<!-- CONTENT -->
<div class="content">

  <!-- BARRA DE CONTROLES -->
  <div class="controls-bar">

    <!-- PESTAÑAS PRINCIPALES -->
    <div class="tab-group">
      <button class="tab-main active hueso" id="tab-hueso" onclick="setTab('con-hueso')">
        🦴 Con Hueso <span class="tab-count" id="cnt-tab-hueso">(0)</span>
      </button>
      <button class="tab-main sin-hueso" id="tab-sin-hueso" onclick="setTab('sin-hueso')">
        ✦ Sin Hueso <span class="tab-count" id="cnt-tab-sin-hueso">(0)</span>
      </button>
      <button class="tab-main" id="tab-all" onclick="setTab('all')" style="border-right:none">
        Todos <span class="tab-count" id="cnt-tab-all">(0)</span>
      </button>
    </div>

    <!-- FILTROS DE ESTADO -->
    <div class="status-filters">
      <button class="sfilter active all" onclick="setStatus('all',this)">Todos</button>
      <button class="sfilter ok"       onclick="setStatus('ok',this)">En Proceso</button>
      <button class="sfilter warn"     onclick="setStatus('warn',this)">Por Vencer</button>
      <button class="sfilter critical" onclick="setStatus('critical',this)">Crítico</button>
      <button class="sfilter expired"  onclick="setStatus('expired',this)">Vencido</button>
    </div>

    <!-- ORDENAMIENTO -->
    <div class="sort-group">
      <span class="sort-label">Ordenar:</span>
      <button class="sort-btn" id="sort-name"   onclick="setSort('name')">A→Z</button>
      <button class="sort-btn active" id="sort-status" onclick="setSort('status')">Estado</button>
      <button class="sort-btn" id="sort-date"   onclick="setSort('date')">Vencimiento</button>
    </div>

    <button class="refresh-btn" onclick="loadEntries()">↺ Actualizar</button>
  </div>

  <!-- LEYENDA -->
  <div class="legend">
    <div class="legend-item" style="border:1px solid #86efac"><div class="legend-dot" style="background:#16a34a"></div><span class="legend-lbl" style="color:#14532d">EN PROCESO</span></div>
    <div class="legend-item" style="border:1px solid #fcd34d"><div class="legend-dot" style="background:#d97706"></div><span class="legend-lbl" style="color:#78350f">POR VENCER</span></div>
    <div class="legend-item" style="border:1px solid #fca5a5"><div class="legend-dot" style="background:#dc2626"></div><span class="legend-lbl" style="color:#7f1d1d">CRÍTICO</span></div>
    <div class="legend-item" style="border:1px solid #d1d5db"><div class="legend-dot" style="background:#9ca3af"></div><span class="legend-lbl" style="color:#374151">VENCIDO</span></div>
  </div>

  <!-- CONTENIDO DINÁMICO -->
  <div id="main-content">
    <div class="cards-grid"><div class="loading-state"><div class="spinner"></div>CARGANDO DATOS…</div></div>
  </div>
</div>

<!-- MODAL DESGLOSE KG -->
<div class="kg-modal-overlay" id="kg-modal">
  <div class="kg-modal">
    <div class="kg-modal-header">
      <div class="kg-modal-title" id="kg-modal-title">DESGLOSE</div>
      <button type="button" class="kg-modal-close" onclick="closeKgModal()">✕</button>
    </div>
    <div class="kg-modal-body" id="kg-modal-body"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-box"></div>
</div>
<div class="toast" id="toast"></div>

// ── Helpers ──────────────────────────────────────
const fmt = d => new Date(d+"T00:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase();
function getStatus(venc){
  const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.ceil((new Date(venc+"T00:00:00")-t)/86400000);
  const k=diff<0?"expired":diff<=1?"critical":diff<=3?"warn":"ok";
  return {...ESTADOS[k],diff,type:k};
}
function getProgress(ingreso,venc){
  const i=new Date(ingreso+"T00:00:00"),v=new Date(venc+"T00:00:00"),n=new Date();
  n.setHours(0,0,0,0);
  return Math.min(100,Math.max(0,Math.round((n-i)/(v-i)*100)));
}
function sbFetch(path,opts={}){
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    ...opts, headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json",...(opts.headers||{})}
  });
}

// ── Render ────────────────────────────────────────
function renderAll(){
  // Conteos por tab
  const cntHueso    = allEntries.filter(e=>getTipo(e)==="con-hueso").length;
  const cntSinHueso = allEntries.filter(e=>getTipo(e)==="sin-hueso").length;
  document.getElementById("cnt-tab-hueso").textContent    = `(${cntHueso})`;
  document.getElementById("cnt-tab-sin-hueso").textContent = `(${cntSinHueso})`;
  document.getElementById("cnt-tab-all").textContent       = `(${allEntries.length})`;

  // Stats globales
  const cnt=t=>allEntries.filter(e=>getStatus(e.fecha_vencimiento).type===t).length;
  document.getElementById("stat-ok").textContent   = cnt("ok");
  document.getElementById("stat-warn").textContent = allEntries.filter(e=>["warn","critical"].includes(getStatus(e.fecha_vencimiento).type)).length;
  document.getElementById("stat-exp").textContent  = cnt("expired");

  // Filtrar por pestaña
  let filtered = currentTab==="all" ? [...allEntries]
    : allEntries.filter(e=>getTipo(e)===currentTab);

  // Filtrar por estado
  if(currentStatus!=="all"){
    if(currentStatus==="warn") filtered=filtered.filter(e=>["warn","critical"].includes(getStatus(e.fecha_vencimiento).type));
    else filtered=filtered.filter(e=>getStatus(e.fecha_vencimiento).type===currentStatus);
  }

  // Ordenar
  if(currentSort==="name"){
    filtered.sort((a,b)=>a.corte.localeCompare(b.corte,"es"));
  } else if(currentSort==="date"){
    filtered.sort((a,b)=>a.fecha_vencimiento.localeCompare(b.fecha_vencimiento));
  } else { // status
    filtered.sort((a,b)=>ORDER_STATUS[getStatus(a.fecha_vencimiento).type]-ORDER_STATUS[getStatus(b.fecha_vencimiento).type]);
  }

  const container = document.getElementById("main-content");

  if(!filtered.length){
    container.innerHTML=`<div class="cards-grid"><div class="empty-state">
      <div class="empty-title">SIN CORTES</div>
      <div class="empty-sub">No hay registros para los filtros seleccionados</div>
    </div></div>`;
    return;
  }

  // Si estamos en "Todos", separar en dos secciones
  if(currentTab==="all"){
    const hueso    = filtered.filter(e=>getTipo(e)==="con-hueso");
    const sinHueso = filtered.filter(e=>getTipo(e)==="sin-hueso");
    let html="";
    if(hueso.length){
      html+=`<div class="category-header">
        <div class="category-badge hueso">🦴 Con Hueso</div>
        <div class="category-line" style="background:#78350f22"></div>
        <div class="category-count">${hueso.length} corte${hueso.length!==1?"s":""}</div>
      </div>
      <div class="cards-grid">${hueso.map(e=>buildCard(e)).join("")}</div>`;
    }
    if(sinHueso.length){
      html+=`<div class="category-header" style="margin-top:${hueso.length?'24px':'0'}">
        <div class="category-badge sin-hueso">✦ Sin Hueso</div>
        <div class="category-line" style="background:#1e40af22"></div>
        <div class="category-count">${sinHueso.length} corte${sinHueso.length!==1?"s":""}</div>
      </div>
      <div class="cards-grid">${sinHueso.map(e=>buildCard(e)).join("")}</div>`;
    }
    container.innerHTML=html;
  } else {
    container.innerHTML=`<div class="cards-grid">${filtered.map(e=>buildCard(e)).join("")}</div>`;
  }

  // Panel KG
  renderKgPanel();

  // Re-highlight
  if(highlightedId){
    document.getElementById("c-"+highlightedId)?.classList.add("highlighted");
  }
}

// ── PANEL RESUMEN KG ─────────────────────────────────────────
function renderKgPanel(){
  const wrap = document.getElementById("kg-chips-wrap");
  const badges = document.getElementById("kg-alert-badges");
  const summary = document.getElementById("kg-summary-inline");
  if(!wrap) return;
  if(!allEntries.length){ wrap.innerHTML='<span style="font-family:IBM Plex Mono;font-size:10px;color:#aaa">Sin datos</span>'; return; }

  // Agrupar por corte
  const grupos = {};
  allEntries.forEach(e=>{
    if(!grupos[e.corte]) grupos[e.corte] = {name:e.corte, tipo:getTipo(e), total:0, items:[]};
    grupos[e.corte].total += parseFloat(e.peso_kg)||0;
    grupos[e.corte].items.push(e);
  });

  const lista = Object.values(grupos).sort((a,b)=>a.name.localeCompare(b.name,"es"));
  const alerts = lista.filter(g=>g.total>80||( g.total<30&&g.total>0));

  // Resumen inline en el botón
  const totalKg = lista.reduce((s,g)=>s+g.total,0);
  summary.textContent = `${totalKg.toFixed(0)} KG · ${lista.length} CORTES`;

  // Badges de alerta en el botón
  badges.innerHTML = alerts.map(g=>
    `<span style="background:${g.total>80?'#450a0a':'#1a1200'};border:1px solid ${g.total>80?'#dc2626':'#f59e0b'};
      color:${g.total>80?'#f87171':'#fbbf24'};font-family:IBM Plex Mono;font-size:8px;
      padding:2px 7px;letter-spacing:1px">${g.name.split(' ')[0].toUpperCase()} ${g.total>80?'↑ ALTO':'↓ BAJO'}</span>`
  ).join('');

  // Chips en el panel
  wrap.innerHTML = lista.map(g=>{
    const isHigh = g.total > 80;
    const isLow  = g.total < 30 && g.total > 0;
    const cls = isHigh?"kg-chip alert-high":isLow?"kg-chip alert-low":"kg-chip alert-ok";
    const icon = isHigh?"↑ SOBRE 80 KG":isLow?"↓ BAJO 30 KG":"✓ EN RANGO";
    const tipoCls = g.tipo==="con-hueso"?"🦴":"✦";
    return `<div class="${cls}" onclick="openKgModal('${g.name.replace(/'/g,"\'")}')">
      <div class="kg-chip-name">${tipoCls} ${g.name.toUpperCase()}</div>
      <div class="kg-chip-val">${g.total.toFixed(1)}</div>
      <div class="kg-chip-unit">${icon} · ${g.items.length} PIEZAS · VER DETALLE ▸</div>
    </div>`;
  }).join('');
}

function openKgModal(corteName){
  const g = allEntries.filter(e=>e.corte===corteName);
  if(!g.length) return;
  const total = g.reduce((s,e)=>s+(parseFloat(e.peso_kg)||0),0);
  const isHigh = total > 80;
  const isLow  = total < 30 && total > 0;
  const alertCls  = isHigh?"high":isLow?"low":"ok";
  const alertMsg  = isHigh?"⚠ SUPERA 80 KG":isLow?"⚠ MENOS DE 30 KG":"✓ DENTRO DEL RANGO";

  document.getElementById("kg-modal-title").textContent = corteName.toUpperCase();
  document.getElementById("kg-modal-body").innerHTML = `
    <div class="kg-modal-total">${total.toFixed(1)}<span>KG TOTAL · ${g.length} PIEZAS</span></div>
    <div class="kg-alert-badge ${alertCls}">${alertMsg}</div>
    <div>${g.map(e=>{
      const s=getStatus(e.fecha_vencimiento);
      const sCls = s.type==="ok"?"s-ok2":s.type==="warn"||s.type==="critical"?"s-warn2 s-crit2":"s-exp2";
      const kg   = parseFloat(e.peso_kg)||0;
      const fmt2 = d=>new Date(d+"T00:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short"}).toUpperCase();
      return `<div class="kg-row">
        <div class="kg-row-left">
          <div class="kg-row-id">${e.id}</div>
          <div class="kg-row-dates">${fmt2(e.fecha_ingreso)} → ${fmt2(e.fecha_vencimiento)}</div>
          <div class="kg-row-status ${sCls}">${s.label}</div>
        </div>
        <div class="kg-row-weight">${kg.toFixed(1)}<span> kg</span></div>
      </div>`;
    }).join("")}</div>`;
  document.getElementById("kg-modal").classList.add("open");
}

function closeKgModal(){
  document.getElementById("kg-modal").classList.remove("open");
}

      <div class="card-dates" style="${e.fecha_reempaque?'grid-template-columns:1fr':'grid-template-columns:1fr 1fr'}">

// ── Tab ───────────────────────────────────────────
function setTab(tab){
  currentTab=tab;
  document.getElementById("tab-hueso").className     = "tab-main"+(tab==="con-hueso"?" active hueso":"");
  document.getElementById("tab-sin-hueso").className = "tab-main"+(tab==="sin-hueso"?" active sin-hueso":"");
  document.getElementById("tab-all").className       = "tab-main"+(tab==="all"?" active":"");
  renderAll();
}

// ── Status filter ─────────────────────────────────
function setStatus(st, el){
  currentStatus=st;
  document.querySelectorAll(".sfilter").forEach(b=>b.classList.remove("active"));
  el.classList.add("active",st);
  renderAll();
}

// ── Sort ──────────────────────────────────────────
function setSort(s){

  document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("sort-"+s).classList.add("active");
  renderAll();
}

// ── Scanner ───────────────────────────────────────
const scanInput=document.getElementById("scanner-input");
let scanBuf="", scanTmr=null;
scanInput.addEventListener("keydown",e=>{ if(e.key==="Enter"){processInput(scanInput.value.trim());scanInput.value="";} });
document.addEventListener("keypress",e=>{
  if(document.activeElement===scanInput) return;
  clearTimeout(scanTmr);
  if(e.key==="Enter"){processInput(scanBuf);scanBuf="";return;}
  scanBuf+=e.key;
  scanTmr=setTimeout(()=>{if(scanBuf.length>3)processInput(scanBuf);scanBuf="";},120);
});

function processInput(raw){
  let id=raw.trim();
  try{const p=JSON.parse(raw);if(p.id)id=p.id;}catch{}
  const entry=allEntries.find(e=>e.id.toLowerCase()===id.toLowerCase());
  if(entry){
    // Cambiar a la pestaña correcta automáticamente
    const tipo=getTipo(entry);
    setTab(tipo);
    highlightedId=entry.id;
    renderAll();
    setTimeout(()=>{
      document.getElementById("c-"+entry.id)?.scrollIntoView({behavior:"smooth",block:"center"});
    },100);
    showToast("✓ ESCANEADO — "+entry.corte+" · "+entry.id);
    setTimeout(()=>{highlightedId=null;renderAll();},4000);
  } else { showToast("✗ ID no encontrado: "+id,true); }
  scanInput.value="";
}

        <div class="modal-stat" style="background:#f9f9f9;border:1px solid #eee">
          <div class="modal-stat-num">${e.dias_maduracion}</div>
          <div class="modal-stat-lbl">DÍAS TOTAL</div>
        </div>
        <div class="modal-stat" style="background:#f9f9f9;border:1px solid #eee">
          <div class="modal-stat-num">${e.peso_kg||"-"}</div>
          <div class="modal-stat-lbl">KG</div>
        </div>
      </div>
      ${e.notas?`<div style="background:#f9f9f9;padding:14px;margin-bottom:20px;border-left:2px solid #ddd;font-family:'IBM Plex Mono';font-size:11px;color:#888">${e.notas}</div>`:""}
      <div style="font-family:'IBM Plex Mono';font-size:9px;color:#333;letter-spacing:2px;margin-bottom:10px">QR DE TRAZABILIDAD</div>
      <div id="modal-qr" style="background:#fff;border:1px solid #eee;display:inline-block;padding:10px"></div>
      <div style="margin-top:12px;font-family:'IBM Plex Mono';font-size:10px;color:#333">Responsable: ${e.responsable}</div>
    </div>`;

  document.getElementById("modal").classList.add("open");
  setTimeout(()=>{
    const el=document.getElementById("modal-qr");
    if(el) new QRCode(el,{text:qr,width:110,height:110,colorDark:"#111",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
  },60);
}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)this.classList.remove("open");});

// ── Toast ─────────────────────────────────────────
function showToast(msg,error=false){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background=error?"#dc2626":"#16a34a";
  t.style.display="block"; setTimeout(()=>t.style.display="none",3000);
}
</script>
</body>
</html>
