function log(msg, cls="info"){
  const d = document.getElementById("log");
  d.innerHTML += `<div class="${cls}">${msg}</div>`;
  d.scrollTop = d.scrollHeight;
}

async function cargar(){
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "Cargando...";
  log(`Iniciando carga de ${ROWS.length} registros...`);
  let ok=0, err=0;
  for(const row of ROWS){
    try{
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
        method:"POST",
        headers:{
          "apikey":SUPABASE_KEY,
          "Authorization":"Bearer "+SUPABASE_KEY,
          "Content-Type":"application/json",
          "Prefer":"return=minimal"
        },
        body: JSON.stringify(row)
      });
      if(r.ok){
        ok++;
        log(`✓ [${ok+err}/${ROWS.length}] ${row.corte} · ${row.fecha_ingreso} · ${row.peso_kg}kg`, "ok");
      } else {
        const txt = await r.text();
        err++;
        log(`✗ ${row.corte} ${row.fecha_ingreso}: ${txt}`, "err");
      }
    }catch(e){
      err++;
      log(`✗ Error: ${e.message}`, "err");
    }
    await new Promise(res=>setTimeout(res,120));
  }
  log(`\n══ LISTO: ${ok} exitosos · ${err} errores ══`, ok===ROWS.length?"ok":"err");
  btn.textContent = "✓ CARGA COMPLETADA";
}
